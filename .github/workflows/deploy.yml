name: Deploy TMX Mercury

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_PATH: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
  TMX_PATH: tmx-mercury
  TMX_NAME: "TMX Mercury"
  PROJECT_NAME: tmx-mercury
  PROJECT_VERSION: ${{ github.ref_name }}
  PORT: 3000
  NODE_ENV: production

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --include=dev
      env:
        NODE_ENV: development
      
    - name: Run prefetch command
      run: npm run prefetch
      
    - name: Run prelint command
      run: npm run prelint
      
    - name: Run init command
      run: npm run prestart
      
    - name: Run tests
      run: npm run test
      env:
        NODE_ENV: development
      
    - name: Run linting
      run: npm run lint
      env:
        NODE_ENV: development

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --include=dev
      env:
        NODE_ENV: development
      
    - name: Run prefetch command
      run: npm run prefetch
      
    - name: Run prelint command
      run: npm run prelint
      
    - name: Run init command
      run: npm run prestart
      
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        PORT: 3000
      
    - name: Upload Pages build artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./build

    - name: Set up QEMU emulation (for cross-platform builds)
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Validate Docker Hub secrets
      if: github.event_name != 'pull_request'
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo 'ERROR: Docker Hub secrets DOCKER_USERNAME and DOCKER_PASSWORD must be configured in repository settings.'
          exit 1
        fi

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          TMX_PATH=${{ env.TMX_PATH }}
          TMX_NAME=${{ env.TMX_NAME }}
          PROJECT_NAME=${{ env.PROJECT_NAME }}
          PROJECT_VERSION=${{ env.PROJECT_VERSION }}
          NODE_ENV=${{ env.NODE_ENV }}
          PORT=${{ env.PORT }}
        
    - name: Configure git identity for deploy
      if: github.event_name != 'pull_request'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
